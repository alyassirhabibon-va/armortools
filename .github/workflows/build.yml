name: Build ArmorPaint 1.0
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate Project
        # We point to the paint folder where the new make.js lives
        run: node paint/make.js -g direct3d11

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild build/ArmorTools.sln /p:Configuration=Release /p:Platform=x64

      - name: Prepare Artifact
        run: |
          mkdir out
          copy build\x64\Release\ArmorTools.exe out\ArmorPaint.exe
          xcopy /E /I data out\data

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-1.0-Windows
          path: out/
