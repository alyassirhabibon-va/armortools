name: Build ArmorPaint 1.0
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Project
        run: |
          $makeFile = Get-ChildItem -Path . -Filter "make.js" -Recurse | Select-Object -First 1
          if (-not $makeFile) { throw "make.js not found" }
          $dir = $makeFile.DirectoryName
          # Create a temp package.json to enable ES Modules (fixes the SyntaxError)
          '{"type": "module"}' | Out-File -FilePath "$dir/package.json" -Encoding utf8
          node "$($makeFile.FullName)" -g direct3d11

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          $slnPath = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -ExpandProperty FullName -First 1
          msbuild $slnPath /p:Configuration=Release /p:Platform=x64

      - name: Prepare Artifact
        run: |
          mkdir out
          $exePath = Get-ChildItem -Path . -Filter "ArmorTools.exe" -Recurse | Select-Object -ExpandProperty FullName -First 1
          copy $exePath out\ArmorPaint.exe
          if (Test-Path "data") { xcopy /E /I data out\data }

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-1.0-Windows
          path: out/
