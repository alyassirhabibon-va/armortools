name: Build ArmorPaint 1.0
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate Project
        run: |
          cd paint
          # This creates the visual studio files
          cmd /c "..\base\make.bat -g direct3d11"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          # FIX: Target the .vcxproj file because .sln was not created
          $projPath = Get-ChildItem -Path . -Filter "*.vcxproj" -Recurse | Select-Object -ExpandProperty FullName -First 1
          
          if (-not $projPath) { 
            throw "Critical: .vcxproj file not found. Generation failed." 
          }
          
          echo "Building Project: $projPath"
          msbuild $projPath /p:Configuration=Release /p:Platform=x64

      - name: Prepare Artifact
        run: |
          mkdir out
          
          # 1. Find and copy the Exe
          $exePath = Get-ChildItem -Path . -Filter "Armor*.exe" -Recurse | Where-Object { $_.Name -notlike "*amake*" } | Select-Object -ExpandProperty FullName -First 1
          if ($exePath) { 
             copy $exePath out\ArmorPaint.exe 
             echo "Success! Copied: $exePath"
          } else {
             throw "Build finished but no ArmorPaint.exe was found!"
          }
          
          # 2. Copy the Data folder (Shaders/Assets)
          # Your logs showed this is located in paint/build/out/data
          if (Test-Path "paint\build\out\data") { 
            echo "Copying data from paint\build\out\data..."
            xcopy /E /I /Y paint\build\out\data out\data 
          } else {
            throw "Critical: Data folder not found!"
          }

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-1.0-Windows
          path: out/
