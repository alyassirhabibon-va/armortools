name: Build ArmorPaint 1.0
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate Project
        # We STOP using 'node' here. We find the included 'make.exe' tool instead.
        run: |
          # Look for the dedicated build tool in the base folder
          $makeTool = Get-ChildItem -Path base -Filter "make.exe" -Recurse | Select-Object -First 1
          
          if (-not $makeTool) {
            echo "make.exe not found in base folder. Listing files for debugging:"
            Get-ChildItem -Path base -Recurse
            exit 1
          }
          
          echo "Found build tool: $($makeTool.FullName)"
          
          # Go into the paint folder and run the tool from there
          cd paint
          & $makeTool.FullName -g direct3d11

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          $slnPath = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -ExpandProperty FullName -First 1
          msbuild $slnPath /p:Configuration=Release /p:Platform=x64

      - name: Prepare Artifact
        run: |
          mkdir out
          $exePath = Get-ChildItem -Path . -Filter "ArmorTools.exe" -Recurse | Select-Object -ExpandProperty FullName -First 1
          if ($exePath) { copy $exePath out\ArmorPaint.exe }
          if (Test-Path "data") { xcopy /E /I data out\data }

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-1.0-Windows
          path: out/
