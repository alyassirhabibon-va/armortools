name: Build ArmorPaint 1.0
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate Project
        run: |
          # Go into the project folder
          cd paint
          
          # Run the official build script located in the base folder
          # We use cmd /c to run the .bat file properly
          cmd /c "..\base\make.bat -g direct3d11"

          # Debug: List generated files to verify success
          echo "Listing generated files in paint/build:"
          if (Test-Path "build") { Get-ChildItem build } else { echo "No build folder found!" }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          # Find the generated Solution file anywhere in the repo
          $slnPath = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -ExpandProperty FullName -First 1
          
          if (-not $slnPath) { 
            echo "Critical: Solution file still not found. Listing all files:"
            Get-ChildItem -Recurse
            throw "Generation failed." 
          }
          
          echo "Building Solution: $slnPath"
          msbuild $slnPath /p:Configuration=Release /p:Platform=x64

      - name: Prepare Artifact
        run: |
          mkdir out
          # Find the compiled .exe (ignoring the build tool itself)
          $exePath = Get-ChildItem -Path . -Filter "Armor*.exe" -Recurse | Where-Object { $_.Name -notlike "*amake*" } | Select-Object -ExpandProperty FullName -First 1
          
          if ($exePath) { 
             copy $exePath out\ArmorPaint.exe 
             echo "Success! Copied: $exePath"
          } else {
             throw "Build finished but no ArmorPaint.exe was found!"
          }
          
          if (Test-Path "paint\data") { xcopy /E /I paint\data out\data }

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-1.0-Windows
          path: out/
